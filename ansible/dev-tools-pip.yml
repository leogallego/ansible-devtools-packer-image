---
- name: Build ansible-dev-tools image (pip)
  hosts: all
  gather_facts: true
  become: true
  vars:
    lab_user: "rhel"
    code_server_password: 'ansible123!'
    ansible_dev_tools_version: "26.4.6"
  tasks:
    - name: Include base setup
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/base_setup.yml"

    - name: Include Python setup
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/python_setup.yml"

    - name: Install ansible-dev-tools via pip
      ansible.builtin.pip:
        name: ansible-dev-tools
        state: present
        executable: pip3.11

    - name: Get installed ansible-dev-tools version
      ansible.builtin.command: pip3.11 show ansible-dev-tools
      changed_when: false
      register: __adt_pip_show

    - name: Write version file
      ansible.builtin.copy:
        content: "{{ __adt_pip_show.stdout | regex_search('Version: (.+)', '\\1') | first }}"
        dest: /etc/ansible-devtools-image-release
        mode: "0644"

    - name: Include image cleanup
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/image_cleanup.yml"
